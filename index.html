<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tabela da Liga</title>

<style>
body{
    font-family: Arial, Helvetica, sans-serif;
    background:#f4f6f9;
    margin:0;
    padding:30px;
}

.container{
    max-width:900px;
    margin:auto;
}

h1{
    text-align:center;
    color:#0d47a1;
    margin-bottom:25px;
}

table{
    width:100%;
    border-collapse:collapse;
    background:#fff;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 4px 12px rgba(0,0,0,.15);
}

thead{
    background:#0d47a1;
    color:white;
}

th, td{
    padding:15px;
    text-align:center;
    border-bottom:1px solid #ddd;
}

tbody tr:hover{
    background:#f1f7ff;
}

.equipa{
    text-align:left;
    font-weight:bold;
}

.subida{
    color:green;
    font-size:24px;
}

.descida{
    color:red;
    font-size:24px;
}

.mantem{
    color:gray;
    font-size:24px;
}
</style>

</head>
<body>

<div class="container">

<h1>🏆 Classificação da Liga</h1>

<table>

<thead>
<tr>
    <th>Equipa</th>
    <th>Jornadas</th>
    <th>MVP da Jornada</th>
    <th>Posição</th>
</tr>
</thead>

<tbody>

<tr>
    <td class="equipa">FC Porto</td>
    <td>12</td>
    <td>4</td>
    <td class="subida">⬆️</td>
</tr>

<tr>
    <td class="equipa">Sporting CP</td>
    <td>12</td>
    <td>3</td>
    <td class="mantem">➖</td>
</tr>

<tr>
    <td class="equipa">SL Benfica</td>
    <td>12</td>
    <td>2</td>
    <td class="descida">⬇️</td>
</tr>

<tr>
    <td class="equipa">SC Braga</td>
    <td>12</td>
    <td>1</td>
    <td class="subida">⬆️</td>
</tr>

<tr>
    <td class="equipa">Vitória SC</td>
    <td>12</td>
    <td>0</td>
    <td class="mantem">➖</td>
</tr>

</tbody>

</table>

</div>

</body>
</html>
